<body class="min-h-screen flex flex-col">

    <main class="container mx-auto px-6 py-12 text-center max-lg flex-grow">
        <h2 class="text-4xl font-black mb-3 uppercase tracking-tight leading-none">TikTok <span class="text-red-600">HD</span></h2>
        <p class="text-gray-500 text-sm mb-10 italic">Processamento original sem marcas d'água.</p>

        <div class="glass-card p-10 rounded-[40px] neon-border text-center">
            <input type="text" id="urlInput" placeholder="Cole o link do TikTok aqui..." class="w-full bg-black border-2 border-gray-800 p-5 rounded-2xl outline-none focus:border-red-600 text-white mb-5 text-center transition-all">
            <button onclick="baixarVideo()" id="btnAction" class="w-full btn-main p-5 rounded-2xl text-xl shadow-2xl">BAIXAR AGORA</button>
        </div>

        <div id="loading" class="mt-10 hidden text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-600 mx-auto"></div>
            <p class="text-red-500 font-black mt-4 uppercase text-[10px]">Processando Vídeo...</p>
        </div>

        <div id="resultado" class="mt-10 hidden"></div>
    </main>

    <footer class="mt-auto border-t border-red-900/30 bg-black py-10 px-8 text-center md:text-left">
        <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            <div class="space-y-2">
                <h3 class="text-xl font-black text-red-600 italic tracking-tighter uppercase text-center md:text-left">SnapNoMark</h3>

            </div>
            <div class="flex flex-col md:items-end gap-2 text-[9px] text-gray-700 uppercase items-center">
                <a href="https://github.com/tiacardo/snapnomark.vercell2/wiki" class="text-white hover:text-red-600 transition">Documentação Oficial</a>
                <p>&copy; 2024 SnapNoMark - Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
        }

        async function baixarVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnAction');
            const loading = document.getElementById('loading');

            if (!urlInput.includes('tiktok.com')) { alert('⚠️ Link inválido!'); return; }

            btn.disabled = true; btn.innerHTML = "AGUARDE...";
            loading.classList.remove('hidden'); resDiv.innerHTML = "";

            const apiKey = '0369b029a8msh559b08a58024200p18eed6jsnd37ffae9158f';
            const apiHost = 'tiktok-video-no-watermark2.p.rapidapi.com';

            try {
                const response = await fetch(`https://${apiHost}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost },
                    body: JSON.stringify({ url: urlInput, hd: "1" })
                });

                const data = await response.json();

                if (data && data.data && data.data.play) {
                    loading.classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    resDiv.innerHTML = `
                        <div class="bg-red-600/5 border border-red-600/20 p-10 rounded-[40px] pulse-red text-center animate-bounce">
                            <p class="text-green-500 font-black mb-5 uppercase text-lg italic text-center">✅ Vídeo Pronto!</p>
                            <a href="${data.data.play}" 
                               onclick="window.open('https://omg10.com/4/10781852', '_blank')" 
                               target="_blank" 
                               class="btn-main block w-full p-5 rounded-2xl font-black text-white text-lg decoration-none">
                                📥 SALVAR VÍDEO MP4 HD
                            </a>
                        </div>`;
                } else { throw new Error(); }
            } catch (error) { alert('Erro na API.'); } 
            finally { btn.disabled = false; btn.innerHTML = "BAIXAR AGORA"; }
        }
    </script>
