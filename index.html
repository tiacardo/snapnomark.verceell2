<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNoMark</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^2.0/dist/tailwind.min.css" rel="stylesheet">
    <script>
        // Monetag Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.error('ServiceWorker registration failed: ', err);
                });
            });
        }
        // Google Analytics
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
        ga('create', 'UA-XXXXX-Y', 'auto');
        ga('send', 'pageview');
    </script>
</head>
<body>
    <div class="container mx-auto">
        <header class="py-5">
            <h1 class="text-3xl font-bold text-center">Welcome to SnapNoMark</h1>
        </header>

        <div class="ads">
            <div class="top-ad slot">Top Ad</div>
            <div class="middle-ad slot">Middle Ad</div>
            <div class="bottom-ad slot">Bottom Ad</div>
        </div>

        <section class="download-form">
            <h2 class="text-2xl mt-5">Download</h2>
            <form action="#" method="post">
                <input type="email" name="email" class="border p-2" placeholder="Enter your email" required />
                <button type="submit" class="bg-blue-500 text-white p-2">Download</button>
            </form>
        </section>

        <section class="faq mt-5">
            <h2 class="text-2xl">FAQ</h2>
            <ul>
                <li>Q: How does SnapNoMark work?</li>
                <li>A: SnapNoMark allows you to...</li>
            </ul>
        </section>

        <footer class="py-5">
            <p class="text-center">© 2026 SnapNoMark. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
