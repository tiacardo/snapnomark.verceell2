<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- 1. NOVA TAG MONETAG (CORRIGIDA) -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="223395" async data-cfasync="false"></script>

    <!-- 2. VERIFICAÇÃO MONETAG -->
    <meta name="monetag" content="3bcfc9ba9946005f642237bc6ca929f4">

    <!-- 3. GOOGLE ADSENSE -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4898368878041703" crossorigin="anonymous"></script>

    <!-- 4. GOOGLE ANALYTICS (G-89HXCVKFTX) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-89HXCVKFTX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-89HXCVKFTX');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapNoMark - Baixar Vídeo do TikTok Sem Marca d'Água HD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --red: #ff0000; --dark: #050505; --gray: #0f0f0f; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .neon-border { border: 1px solid var(--red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-main { background: var(--red); color: white !important; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 30px var(--red); }
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 border-b border-gray-900 bg-black/90 sticky top-0 z-50 text-center">
        <h1 class="text-3xl font-black text-red-600 italic tracking-tighter uppercase">SnapNoMark</h1>
    </nav>

    <main class="container mx-auto px-6 py-12 text-center max-w-lg flex-grow">
        <h2 class="text-3xl font-black mb-10 uppercase leading-tight tracking-tight text-white">TikTok Downloader <span class="text-red-600">HD</span></h2>

        <!-- CAIXA DE DOWNLOAD -->
        <div class="glass-card p-10 rounded-[40px] neon-border">
            <input type="text" id="urlInput" placeholder="Cole o link do TikTok aqui..." class="w-full p-5 rounded-2xl bg-black border-2 border-gray-800 text-white mb-6 text-center outline-none focus:border-red-600 transition-all">
            <button onclick="baixarVideo()" id="btnAction" class="w-full btn-main p-5 rounded-2xl text-xl shadow-2xl">BAIXAR AGORA</button>
        </div>

        <div id="loading" class="mt-10 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-600 mx-auto"></div>
            <p class="text-red-500 font-bold mt-4 uppercase text-[10px] tracking-widest">Processando vídeo...</p>
        </div>

        <div id="resultado" class="mt-10 hidden"></div>
    </main>

    <footer class="p-10 text-center text-[10px] text-gray-700 border-t border-gray-900 bg-black">
        <p class="font-black text-red-600 mb-2 uppercase tracking-widest text-lg italic text-center">SnapNoMark</p>
        &copy; 2024 - Download TikTok Oficial HD.
    </footer>

    <script>
        // --- 1. REGISTRO DO SW.JS (PUSH NOTIFICATIONS) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Notificações Prontas!');
                }).catch(err => console.log('Erro SW:', err));
            });
        }

        // --- 2. LÓGICA DE DOWNLOAD ---
        async function baixarVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnAction');
            const loading = document.getElementById('loading');

            if (!urlInput.includes('tiktok.com')) {
                alert('⚠️ Cole um link válido do TikTok!');
                return;
            }

            btn.disabled = true; btn.innerHTML = "CARREGANDO...";
            loading.classList.remove('hidden'); resDiv.innerHTML = "";

            const apiKey = '0369b029a8msh559b08a58024200p18eed6jsnd37ffae9158f';
            const apiHost = 'tiktok-video-no-watermark2.p.rapidapi.com';

            try {
                const response = await fetch(`https://${apiHost}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost },
                    body: JSON.stringify({ url: urlInput, hd: "1" })
                });

                const data = await response.json();

                if (data && data.data && data.data.play) {
                    loading.classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    resDiv.innerHTML = `
                        <div class="bg-red-600/5 border border-red-600/20 p-8 rounded-[35px] animate-pulse">
                            <p class="text-green-500 font-black mb-4 uppercase">✅ VÍDEO PRONTO!</p>
                            <!-- GATILHO DE ANÚNCIO (omg10.com) -->
                            <a href="${data.data.play}" 
                               onclick="window.open('https://omg10.com/4/10781852', '_blank')" 
                               target="_blank" 
                               class="btn-main block w-full p-5 rounded-2xl font-black text-white text-center text-lg decoration-none">
                                📥 SALVAR MP4 HD
                            </a>
                        </div>`;
                } else { throw new Error(); }
            } catch (error) {
                loading.classList.add('hidden');
                alert('Erro ao processar. Tente novamente mais tarde.');
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = "BAIXAR AGORA"; 
            }
        }
    </script>
</body>
</html>
