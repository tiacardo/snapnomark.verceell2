<body class="min-h-screen flex flex-col">

    <!-- 5. MONETAG SMART TAG -->
    <script src="https://alwingulla.com/act/files/tag.min.js?z=10781852" data-cfasync="false" async></script>

    <nav class="p-5 border-b border-gray-900 bg-black/90 sticky top-0 z-50 flex justify-between items-center px-8">
        <h1 class="text-2xl font-black text-red-600 italic tracking-tighter uppercase">SnapNoMark</h1>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            <span class="text-[9px] font-bold uppercase text-gray-400 tracking-widest text-center">Server HD Ativo</span>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 text-center max-w-lg flex-grow">
        <h2 class="text-4xl font-black mb-2 uppercase leading-tight">TikTok <span class="text-red-600">HD</span></h2>
        <p class="text-gray-400 text-sm mb-10 font-medium italic text-center">Rápido, Grátis e Sem Marca d'Água.</p>

        <div class="glass-card p-10 rounded-[40px] neon-border text-center">
            <input type="text" id="urlInput" placeholder="Cole o link do TikTok aqui..." 
                class="w-full bg-black border-2 border-gray-800 p-5 rounded-2xl outline-none focus:border-red-600 text-white mb-6 text-center">
            <button onclick="baixarVideo()" id="btnAction" class="w-full btn-main p-5 rounded-2xl text-xl shadow-2xl">BAIXAR AGORA</button>
        </div>

        <div id="loading" class="mt-10 hidden text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-600 mx-auto"></div>
            <p class="text-red-500 font-black mt-4 uppercase text-[10px] tracking-widest">Processando vídeo...</p>
        </div>

        <div id="resultado" class="mt-10 hidden"></div>
    </main>

    <footer class="mt-auto border-t border-red-900/30 bg-black py-10 px-8 text-center">
        <h3 class="text-2xl font-black text-red-600 italic uppercase mb-2">SnapNoMark</h3>
        <p class="text-[10px] text-gray-700 uppercase tracking-[0.3em]">&copy; 2024 - Tecnologia Oficial de Extração Digital</p>
    </footer>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
        }

        async function baixarVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnAction');
            const loading = document.getElementById('loading');

            if (!urlInput.includes('tiktok.com')) {
                alert('⚠️ Link inválido!');
                return;
            }

            btn.disabled = true; btn.innerHTML = "PROCESSANDO...";
            loading.classList.remove('hidden'); resDiv.innerHTML = "";

            const apiKey = '0369b029a8msh559b08a58024200p18eed6jsnd37ffae9158f';
            const apiHost = 'tiktok-video-no-watermark2.p.rapidapi.com';

            try {
                const response = await fetch(`https://${apiHost}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost },
                    body: JSON.stringify({ url: urlInput, hd: "1" })
                });

                const data = await response.json();

                if (data && data.data && data.data.play) {
                    loading.classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    resDiv.innerHTML = `
                        <div class="bg-red-600/5 border border-red-600/20 p-10 rounded-[40px] pulse-red text-center">
                            <p class="text-green-500 font-black mb-4 uppercase text-lg italic">✅ VÍDEO PRONTO!</p>
                            <a href="${data.data.play}" 
                               onclick="window.open('https://omg10.com/4/10781852', '_blank')" 
                               target="_blank" 
                               class="btn-main block w-full p-5 rounded-2xl font-black text-white text-lg decoration-none">
                                📥 SALVAR VÍDEO AGORA
                            </a>
                        </div>`;
                } else { throw new Error(); }
            } catch (error) {
                loading.classList.add('hidden');
                alert('Erro ao processar. Certifique-se de que o vídeo é público.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = "BAIXAR AGORA";
            }
        }
    </script>
