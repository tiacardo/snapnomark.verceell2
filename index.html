<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- 1. VERIFICAÇÃO MONETAG (Meta Tag vai aqui se você tiver) -->
    
    <!-- 2. GOOGLE ANALYTICS (G-89HXCVKFTX) -->

    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapNoMark - Baixar Vídeo do TikTok Sem Marca d'Água HD</title>
    <meta name="description" content="O SnapNoMark é a melhor ferramenta online para baixar vídeos do TikTok sem marca d'água em HD. Rápido, gratuito e ilimitado.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --red: #ff0000; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; line-height: 1.6; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); }
        .red-glow { box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); }
        .btn-main { background: var(--red); color: #ffffff !important; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { background: #cc0000; transform: translateY(-2px); }
        input { background: #000 !important; border: 2px solid #222 !important; color: white !important; text-align: center; outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 3. MONETAG SMART TAG (Anúncios Automáticos) -->
    <script src="https://alwingulla.com/act/files/tag.min.js?z=10781852" data-cfasync="false" async></script>

    <nav class="p-6 border-b border-gray-900 bg-black sticky top-0 z-50 text-center text-red-600 font-black italic text-3xl">SnapNoMark</nav>

    <main class="container mx-auto px-6 py-10 text-center max-w-lg flex-grow">
        <h2 class="text-3xl font-black mb-4 uppercase">TikTok Downloader <span class="text-red-600">HD</span></h2>
        
        <div class="glass-card p-10 rounded-[40px] red-glow">
            <input type="text" id="urlInput" placeholder="Cole o link do TikTok aqui..." class="w-full p-5 rounded-2xl mb-6 text-lg">
            <button onclick="baixarVideo()" id="btnAction" class="w-full btn-main p-5 rounded-2xl text-xl shadow-2xl">BAIXAR AGORA</button>
        </div>

        <div id="loading" class="mt-10 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-red-600 mx-auto"></div>
            <p class="text-red-500 font-black mt-4 uppercase text-[10px]">Processando...</p>
        </div>

        <div id="resultado" class="mt-10 hidden"></div>
    </main>

    <footer class="p-10 text-center text-[11px] text-gray-700 border-t border-gray-900 bg-black">
        <p class="font-black text-red-600 mb-2 uppercase tracking-widest text-lg">SnapNoMark</p>
        &copy; 2024 - Todos os direitos reservados.
    </footer>

    <!-- AQUI ESTÁ O SCRIPT QUE LIGA O SW.JS -->
    <script>
        // ESTA PARTE ABAIXO "ATIVA" O ARQUIVO SW.JS QUE VOCÊ CRIOU
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(reg) {
                    console.log('SnapNoMark: Notificações Prontas!');
                }).catch(function(err) {
                    console.log('Erro ao ligar o Service Worker:', err);
                });
            });
        }

        // LÓGICA DE DOWNLOAD
        async function baixarVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnAction');
            const loading = document.getElementById('loading');
            
            if (!urlInput.includes('tiktok.com')) {
                alert('⚠️ Link inválido!');
                return;
            }

            btn.disabled = true; 
            btn.innerHTML = "CARREGANDO..."; 
            loading.classList.remove('hidden'); 
            resDiv.innerHTML = "";

            const apiKey = '0369b029a8msh559b08a58024200p18eed6jsnd37ffae9158f';
            const apiHost = 'tiktok-video-no-watermark2.p.rapidapi.com';

            try {
                const response = await fetch(`https://${apiHost}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost },
                    body: JSON.stringify({ url: urlInput, hd: "1" })
                });
                const data = await response.json();
                if (data && data.data && data.data.play) {
                    loading.classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    resDiv.innerHTML = `
                        <div class="bg-red-600/5 border border-red-600/20 p-8 rounded-[35px] animate-pulse">
                            <p class="text-green-500 font-black mb-4 uppercase">✅ Vídeo Pronto!</p>
                            <a href="${data.data.play}" target="_blank" class="btn-main block w-full p-5 rounded-2xl font-black text-white text-center text-lg decoration-none shadow-xl">
                                📥 SALVAR MP4 HD
                            </a>
                        </div>`;
                } else { throw new Error(); }
            } catch (error) {
                alert('Erro na API. Tente novamente mais tarde.');
                loading.classList.add('hidden');
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = "BAIXAR AGORA"; 
            }
        }
    </script>
</body>
</html>
