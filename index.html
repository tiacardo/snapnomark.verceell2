<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- VERIFICACAO MONETAG (Meta tag correta abaixo) -->
    <meta name="monetag" content="COLE_AQUI_SEU_CODIGO_MONETAG">

    <!-- 1. GOOGLE ANALYTICS (SYNTAX EM INGLES) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-89HXCVKFTX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-89HXCVKFTX');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapNoMark - Baixar Vídeo do TikTok Sem Marca d'Água HD</title>
    <meta name="description" content="Baixe vídeos do TikTok sem marca d'água em HD com o SnapNoMark. Rápido, gratuito e ilimitado para Android e iPhone.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --red: #ff0000; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .btn-main { background: var(--red); color: #ffffff !important; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- MONETAG SMART TAG (NAO TRADUZIR O SRC) -->
    <script src="https://alwingulla.com/act/files/tag.min.js?z=10781852" data-cfasync="false" async></script>

    <nav class="p-6 border-b border-gray-900 bg-black text-center">
        <h1 class="text-3xl font-black text-red-600 italic uppercase">SnapNoMark</h1>
    </nav>

    <main class="container mx-auto px-6 py-10 text-center max-w-lg">
        <input type="text" id="urlInput" placeholder="Cole o link do TikTok aqui..." class="w-full p-5 rounded-2xl bg-black border-2 border-gray-800 text-white text-center">
        <button onclick="baixarVideo()" id="btnAction" class="w-full btn-main p-5 rounded-2xl text-xl mt-5">BAIXAR AGORA</button>
        <div id="resultado" class="mt-10 hidden"></div>
    </main>

    <script>
        // LOGICA EM INGLES (O NAVEGADOR PRECISA DISSO)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js');
            });
        }

        async function baixarVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resDiv = document.getElementById('resultado');
            
            if (!urlInput.includes('tiktok.com')) {
                alert('⚠️ Link inválido!');
                return;
            }

            const apiKey = '0369b029a8msh559b08a58024200p18eed6jsnd37ffae9158f';
            const apiHost = 'tiktok-video-no-watermark2.p.rapidapi.com';

            try {
                const response = await fetch(`https://${apiHost}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost },
                    body: JSON.stringify({ url: urlInput, hd: "1" })
                });
                const data = await response.json();
                if (data && data.data && data.data.play) {
                    resDiv.classList.remove('hidden');
                    resDiv.innerHTML = `<a href="${data.data.play}" target="_blank" class="btn-main block p-5 rounded-2xl text-center">📥 SALVAR MP4 HD</a>`;
                }
            } catch (e) { alert('Erro na API'); }
        }
    </script>
</body>
</html>
