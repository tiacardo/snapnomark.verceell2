<body class="min-h-screen flex flex-col">

    <script>
        // --- 1. REGISTRO DO SERVICE WORKER (NOTIFICAÇÕES PUSH) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(reg) {
                    console.log('SnapNoMark: Notificações Prontas!');
                }).catch(function(err) {
                    console.log('Erro no Service Worker:', err);
                });
            });
        }

        // --- 2. LÓGICA DE DOWNLOAD ---
        async function baixarVideo() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnAction');
            const loading = document.getElementById('loading');

            if (!urlInput.includes('tiktok.com')) {
                alert('⚠️ Cole um link válido do TikTok!');
                return;
            }

            gtag('event', 'tentativa_download', { 'link': urlInput });

            btn.disabled = true;
            btn.innerHTML = "CARREGANDO...";
            loading.classList.remove('hidden');
            resDiv.innerHTML = "";

            const apiKey = '0369b029a8msh559b08a58024200p18eed6jsnd37ffae9158f';
            const apiHost = 'tiktok-video-no-watermark2.p.rapidapi.com';

            try {
                const response = await fetch(`https://${apiHost}/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-rapidapi-key': apiKey, 'x-rapidapi-host': apiHost },
                    body: JSON.stringify({ url: urlInput, hd: "1" })
                });

                const data = await response.json();

                if (data && data.data && data.data.play) {
                    loading.classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    resDiv.innerHTML = `
                        <div class="bg-red-600/5 border border-red-600/20 p-8 rounded-[35px] animate-pulse">
                            <p class="text-green-500 font-black mb-4 uppercase text-center">✅ Vídeo Pronto!</p>
                            <a href="${data.data.play}" target="_blank" class="btn-main block w-full p-5 rounded-2xl font-black text-white text-center text-lg decoration-none">
                                📥 SALVAR MP4 HD
                            </a>
                        </div>`;
                } else { throw new Error(); }
            } catch (error) {
                alert('Erro na API. Verifique o link ou cota diária.');
                loading.classList.add('hidden');
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = "BAIXAR AGORA"; 
            }
        } if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js');
  });
}
    </script>
